<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail</title>
  <link rel="stylesheet" href="../design/ProductDetail.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-left">
      <h1 class="logo">CRKD</h1>
    </div>
    <div class="nav-right">
      <i class="fa-solid fa-magnifying-glass"></i>
      <i class="fa-solid fa-cart-shopping"></i>
      <i class="fa-regular fa-circle-user"></i>
    </div>
  </header>

  <!-- Product Detail Section -->
  <main class="product-detail">
    <div class="container">
      <div class="row">
        
        <!-- Product Image -->
        <div class="col-md-6 text-center">
          <img id="product-image" src="" alt="Product Image">
          <p class="view-label">Front</p>
        </div>

        <!-- Product Info -->
        <div class="col-md-6">
          <h2 id="product-title">Product Name</h2>
          <p id="product-price" class="h4 text-muted">₱0.00</p>

          <!-- Size Options -->
          <p><strong>Size:</strong></p>
          <div id="size-options" class="btn-group mb-3" role="group"></div>

          <!-- Quantity Selector -->
          <p><strong>Quantity:</strong></p>
          <input type="number" id="quantity" value="1" min="1" class="form-control w-25 mb-3">

          <!-- Add to Cart -->
          <button class="btn btn-dark btn-lg">Add to Cart</button>

          <!-- Description -->
          <div class="description">
            <h4>Description</h4>
            <p id="product-description">Description goes here...</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Script -->
  <script src="../scripts/ProductDetail.js"></script>
</body>
</html>
