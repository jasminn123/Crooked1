<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory | CRKD</title>
  
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design/inventory.css">
</head>
<body>
  <div class="inventory-container">
    <div class="inventory-header">
      <h1 class="login-title">Stock Inventory</h1>
      <button class="btn-refresh" onclick="loadInventory()">Refresh List</button>
    </div>

    <table class="styled-table">
      <thead>
        <tr>
          <th>Product Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock Quantity</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="inventory-list">
        <tr>
          <td colspan="5">Loading database products...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="../javascript/inventory.js"></script>
</body>
</html>
