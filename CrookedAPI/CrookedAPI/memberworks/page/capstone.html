<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Crooked</title>
    
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <span id="menu-toggle" style="font-size: 22px; cursor:pointer;">&#9776;</span>
            <span class="navbar-title">Crooked</span>
        </div>
        <div class="navbar-icons">
            <span style="cursor:pointer;">&#128269;</span>
            <span style="cursor:pointer;">&#128722;</span>
            <span style="cursor:pointer;">&#128100;</span>
        </div>
    </nav>
    <div id="side-menu" class="side-menu">
        <ul>
            <li>All Products</li>
            <li>Men</li>
            <li>Female</li>
            <li>Accessories</li>
            <li>Limited</li>
        </ul>
    </div>
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>crook·ed</h1>
            <p>not straight, symmetrical, or aligned.</p>
            
        </div>
        <div class="floating-btn left">
            Get 50% off
            <button class="close-btn" onclick="this.parentElement.style.display='none'">&#10005;</button>
        </div>
        <div class="floating-btn right">
            Chat
            <button class="close-btn" onclick="this.parentElement.style.display='none'">&#10005;</button>
        </div>
    </section>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sideMenu = document.getElementById('side-menu');
        document.body.addEventListener('click', function(e) {
            if (e.target === menuToggle) {
                sideMenu.classList.toggle('open');
            } else if (!sideMenu.contains(e.target)) {
                sideMenu.classList.remove('open');
            }
        });
    </script>
</body>
</html>
