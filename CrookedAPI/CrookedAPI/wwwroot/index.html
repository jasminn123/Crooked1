<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>CRKD | Login</title>
    
   <style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: #0b0b0b; 
        background-image: radial-gradient(circle at center, #1a1a1a 0%, #0b0b0b 100%);
        color: white; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0;
        padding: 20px; 
        box-sizing: border-box;
        overflow: hidden;
    }

    .login-card { 
        width: 100%;
        max-width: 420px; 
        padding: 50px;    
        background: #141414; 
        border-radius: 28px;
        border: 1px solid #222;
        text-align: center;
        box-shadow: 0 10px 50px rgba(0,0,0,0.7);
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .logo-img { width: 120px; margin-bottom: 20px; transition: width 0.3s ease; }
    h2 { font-weight: 600; margin-bottom: 30px; letter-spacing: -0.5px; transition: font-size 0.3s ease; }
    
    .input-group { text-align: left; margin-bottom: 15px; }
    label { 
        display: block; 
        font-size: 11px; 
        color: #888; 
        margin-bottom: 8px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
        margin-left: 5px;
    }
    
    input { 
        width: 100%; 
        padding: 14px; 
        border-radius: 12px; 
        border: 1px solid #222; 
        background: #1e1e1e; 
        color: white; 
        box-sizing: border-box; 
        font-size: 14px; 
        transition: 0.3s ease;
    }
    input:focus { 
        border-color: #fff; 
        outline: none; 
        background: #252525;
        box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }

    button { 
        width: 100%; 
        padding: 14px; 
        background: #ffffff; 
        color: #000; 
        border: none; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 700; 
        text-transform: uppercase; 
        font-size: 14px;
        margin-top: 10px; 
        transition: all 0.2s ease;
    }
    button:hover { 
        transform: translateY(-2px); 
        box-shadow: 0 5px 15px rgba(255,255,255,0.2); 
        background: #f0f0f0;
    }
    button:active { transform: translateY(0); }

    /* 4. Extras & Message */
    .login-extras { margin-top: 25px; }
    #forgot-password-link { 
        color: #555; 
        font-size: 0.85rem; 
        text-decoration: none; 
        transition: 0.3s; 
    }
    #forgot-password-link:hover { color: #aaa; text-decoration: underline; }

    #message { 
        margin-top: 20px; 
        font-size: 13px; 
        min-height: 18px; 
        font-weight: 500; 
        color: #ff5555; 
    }

    #reset-modal {
        display: none; 
        position: fixed; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        background: #141414; 
        padding: 35px; 
        border-radius: 24px; 
        border: 1px solid #333; 
        z-index: 1000; 
        box-shadow: 0 0 100px rgba(0,0,0,0.9); 
        width: 90%; 
        max-width: 350px; 
        text-align: center;
        box-sizing: border-box;
    }
    .modal-overlay {
        display: none; 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: rgba(0,0,0,0.85); 
        z-index: 999;
        backdrop-filter: blur(4px);
    }

    
    @media (min-width: 1024px) {
        .login-card {
            max-width: 800px; 
            padding: 80px;    
        }
        .logo-img { width: 160px; }
        h2 { font-size: 2.2rem; }
    }

    @media (max-width: 768px) {
        .login-card { max-width: 500px; padding: 60px 40px; }
    }

    @media (max-width: 480px) {
        .login-card { padding: 35px 25px; border-radius: 24px; max-width: 100%; }
        h2 { font-size: 1.5rem; margin-bottom: 25px; }
        .logo-img { width: 100px; }
        input, button { padding: 12px; }
    }

    @media (max-width: 280px) {
        .logo-img { width: 80px; }
        h2 { font-size: 1.2rem; }
    }
</style>
</head>
<body>

    <div class="modal-overlay" id="overlay" onclick="closeReset()"></div>

    <div class="login-card">
        <img src="images/logo.png" class="logo-img" alt="CRKD">
        <h2>Clothing Shop</h2>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="user" placeholder="Enter username">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button onclick="login()">Login</button>

        <div class="login-extras">
            <a href="#" id="forgot-password-link">Forgot Password?</a>
        </div>

        <p id="message"></p>
    </div>

    <div id="reset-modal">
        <h3 style="margin-top: 0;">Owner Recovery</h3>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Enter your username and master key to reset.</p>
        <input type="text" id="reset-username" placeholder="Owner Username" style="margin-bottom: 10px;">
        <input type="password" id="recovery-key" placeholder="Master Recovery Key" style="margin-bottom: 10px;">
        <input type="password" id="new-password" placeholder="New Password" style="margin-bottom: 20px;">
        <button onclick="submitReset()">Update Password</button>
        <button onclick="closeReset()" style="background:#222; color: white; margin-top: 10px;">Cancel</button>
        <p id="reset-msg" style="color:#ff5555; font-size: 12px; margin-top: 15px;"></p>
    </div>

    <script>
        const API_BASE = "http://localhost:5055/api/Auth";

        async function login() {
            const userField = document.getElementById('user');
            const passField = document.getElementById('pass');
            const msg = document.getElementById('message');

            const username = userField.value.trim();
            const password = passField.value.trim();

            if (!username || !password) {
                msg.style.color = "#ff5555";
                msg.innerText = "Please enter both fields.";
                return;
            }

            msg.style.color = "#888";
            msg.innerText = "Authenticating...";

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Username: username, Password: password })
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem("userRole", result.role); 
                    localStorage.setItem("userName", result.fullName || result.username || "User");

                    msg.style.color = "#4caf50";
                    msg.innerText = "Access Granted! Opening dashboard...";
                    
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                } else {
                    const errorData = await response.json();
                    msg.style.color = "#ff5555";
                    msg.innerText = errorData.message || "Invalid username or password";
                }
            } catch (err) {
                msg.style.color = "#ff5555";
                msg.innerText = "Connection failed. Check if API is running.";
            }
        }

        document.getElementById('forgot-password-link').onclick = function(e) {
            e.preventDefault();
            document.getElementById('reset-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        };

        function closeReset() {
            document.getElementById('reset-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('reset-msg').innerText = "";
        }

        async function submitReset() {
            const data = {
                username: document.getElementById('reset-username').value,
                recoveryKey: document.getElementById('recovery-key').value,
                newPassword: document.getElementById('new-password').value
            };

            try {
                const response = await fetch(`${API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const msgField = document.getElementById('reset-msg');
                msgField.innerText = result.message;

                if (response.ok) {
                    msgField.style.color = "#4caf50";
                    alert("Password updated! Please login.");
                    closeReset();
                } else {
                    msgField.style.color = "#ff5555";
                }
            } catch (err) {
                document.getElementById('reset-msg').innerText = "Server error.";
            }
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
